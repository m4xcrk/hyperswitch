name: Create a nightly tag

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  ALLOWED_BRANCH_NAME: main

jobs:
  update-postman-collections:
    name: Update Postman collection JSON files
    runs-on: ubuntu-latest

    permissions:
      contents: write   # REQUIRED for git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Check if the workflow is run on an allowed branch
        shell: bash
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/${ALLOWED_BRANCH_NAME}" ]]; then
            echo "::error::This workflow must run on '${ALLOWED_BRANCH_NAME}'. Current: '${{ github.ref }}'"
            exit 1
          fi

      - name: Check if the latest commit is a tag
        shell: bash
        run: |
          if [[ -n "$(git tag --points-at HEAD)" ]]; then
            echo "::error::The latest commit is already tagged"
            exit 1
          fi

      - name: Update Postman collection files
        shell: bash
        run: |
          npm ci

          POSTMAN_DIR="postman/collection-dir"
          POSTMAN_JSON_DIR="postman/collection-json"
          export PATH="$(pwd)/node_modules/.bin:${PATH}"

          for connector_dir in "${POSTMAN_DIR}"/*; do
            connector="$(basename "${connector_dir}")"
            newman dir-import \
              "${POSTMAN_DIR}/${connector}" \
              -o "${POSTMAN_JSON_DIR}/${connector}.postman_collection.json"
          done

          if git add postman && ! git diff --staged --quiet postman; then
            echo "POSTMAN_COLLECTION_FILES_UPDATED=true" >> "$GITHUB_ENV"
          fi

      - name: Set git identity
        if: env.POSTMAN_COLLECTION_FILES_UPDATED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        if: env.POSTMAN_COLLECTION_FILES_UPDATED == 'true'
        run: |
          git commit -m "chore(postman): update Postman collection files"
          git push origin "${ALLOWED_BRANCH_NAME}"

  create-nightly-tag:
    name: Create a nightly tag
    needs: update-postman-collections
    uses: ./.github/workflows/release-nightly-version-reusable.yml
    secrets:
      token: ${{ github.token }}
